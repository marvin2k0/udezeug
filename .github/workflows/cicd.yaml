name: Pipeline

on:
  push:
    branches:
      - '**'
      
env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ghcr.io/${{ github.repository_owner }}/udezeug-backend
  IMAGE_NAME_FRONTEND: ghcr.io/${{ github.repository_owner }}/udezeug-frontend

jobs:
  test-backend:
    name: Run Spring Boot Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven Tests
        working-directory: ./backend
        run: mvn clean test
        
  build-and-push:
    name: Build and Push Docker Images
    needs: test-backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Docker Metadata
        id: meta
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "backend_image=ghcr.io/$REPO_OWNER/udezeug-backend" >> $GITHUB_OUTPUT
          echo "frontend_image=ghcr.io/$REPO_OWNER/udezeug-frontend" >> $GITHUB_OUTPUT
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "env_tag=latest" >> $GITHUB_OUTPUT
          else
            echo "env_tag=dev-latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.commit_hash }}
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.env_tag }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.commit_hash }}
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.env_tag }}
