<div class="container max-w-2xl mx-auto">
  <div class="search-box relative">
    <input
      class="block mx-auto py-3 px-6 rounded-full w-full shadow shadow-black bg-surface-variant focus:ring-2 focus:ring-primary focus:outline-none"
      type="search"
      placeholder="Suche" [formControl]="searchControl">
    <mat-icon class="absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer">
      search
    </mat-icon>
  </div>
</div>

<div class="container">
  @if (courses.hasValue()) {
    <div class="p-5 flex flex-row justify-between">
      <h2>Suchergebnisse</h2>
      <span>
            {{ courses.value().length }} Ergebnisse
          </span>
    </div>

    <ul class="flex flex-col gap-4">
      @for (course of courses.value(); track course.id) {
        <li>
          <mat-card class="p-5">
            <div class="flex flex-col">
              <mat-card-title>
                <span routerLink="/course/{{ course.id }}">{{ course.name }}</span>
              </mat-card-title>
              <mat-card-subtitle>
                <span class="text-gray-400">{{ course.description }}</span>
              </mat-card-subtitle>
            </div>
          </mat-card>
        </li>
      }
    </ul>
  }
</div>
